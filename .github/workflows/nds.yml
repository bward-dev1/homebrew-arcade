name: NDS build + smoke test

on:
  push:
    paths:
      - "nds/**"
      - ".github/workflows/nds.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # apt.devkitpro.org (the host behind install-devkitpro-pacman) sits
      # behind Cloudflare bot-blocking and reliably rejects GitHub Actions
      # runners with a "Sorry, you have been blocked" page instead of the
      # install script. Rather than fight that, build inside devkitPro's
      # own official Docker image (docker.io/devkitpro/devkitarm), which
      # already ships gba-dev/nds-dev/3ds-dev preinstalled via dkp-pacman
      # at image-build time - no network call to apt.devkitpro.org happens
      # in CI at all.
      - name: Build all NDS games (devkitPro Docker toolchain)
        run: |
          shopt -s nullglob
          games=(nds/games/*/)
          if [ ${#games[@]} -eq 0 ]; then
            echo "No games under nds/games/ - nothing to build."
            exit 0
          fi
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
            devkitpro/devkitarm bash -c '
              set -e
              shopt -s nullglob
              for dir in nds/games/*/; do
                echo "== building $dir =="
                make -C "$dir"
              done
            '

      # Same rationale as gba.yml: a headless melonDS/desmume boot is not
      # reliably available via apt on ubuntu-latest and is fragile to keep
      # green in unattended CI, so we fall back to an NDS ROM header check
      # (Nintendo logo checksum field + plausible file size) instead of a
      # real emulator boot.
      - name: Header sanity check (fallback smoke test)
        run: |
          shopt -s nullglob
          roms=(nds/games/*/*.nds)
          if [ ${#roms[@]} -eq 0 ]; then
            echo "No .nds ROMs produced - nothing to check."
            exit 0
          fi
          for rom in "${roms[@]}"; do
            echo "== checking $rom =="
            size=$(stat -c%s "$rom")
            if [ "$size" -lt 512 ] || [ "$size" -gt 536870912 ]; then
              echo "FAIL: $rom size $size bytes is outside the plausible NDS ROM range"
              exit 1
            fi
            # NDS header: logo checksum is a fixed 16-bit value (0xCF56) at
            # offset 0x15C, validated by every real NDS boot ROM/emulator.
            # Read the two raw bytes in file order (no -e endian-swap):
            # devkitARM/ndstool write this field such that the plain byte
            # sequence at 0x15C is CF 56, matching the documented constant
            # directly. The previous `-e` flag byte-swapped 16-bit groups
            # and produced 56cf, which never matched a real ROM - this was
            # never validated against an actual build until this game.
            checksum=$(xxd -s 0x15C -l 2 -p "$rom")
            if [ "$checksum" != "cf56" ]; then
              echo "FAIL: $rom logo checksum at 0x15C is 0x$checksum, expected 0xcf56"
              exit 1
            fi
            echo "OK: $rom ($size bytes, logo checksum valid)"
          done

      - name: Upload ROM artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nds-roms
          path: nds/games/*/*.nds
          if-no-files-found: ignore
